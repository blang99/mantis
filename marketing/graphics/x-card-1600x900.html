<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!--
  X / Twitter in-stream card — 1600×900 (16:9).
  EXPORT: open in browser sized to 1600×900 and screenshot the page,
  or use the Preview MCP (resize 1600×900 → screenshot). PNG, no transparency needed.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
    :root{
        --mantis:#5CDB7A; --mantis-bright:#7AE99A; --mantis-dim:#3a9b55;
        --ink:#DCEBE1; --muted:#8CAA96;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:1600px;height:900px;overflow:hidden;}
    body{
        background:
            radial-gradient(1100px 760px at 72% 16%, rgba(92,219,122,0.16), transparent 60%),
            radial-gradient(900px 640px at 4% 104%, rgba(92,219,122,0.07), transparent 60%),
            #050c07;
        font-family:'Space Grotesk',sans-serif; color:var(--ink); position:relative;
    }
    .grid{
        position:absolute; inset:0;
        background-image:
            linear-gradient(rgba(92,219,122,0.05) 1px,transparent 1px),
            linear-gradient(90deg, rgba(92,219,122,0.05) 1px,transparent 1px);
        background-size:72px 72px;
        mask-image:radial-gradient(1100px 760px at 50% 45%,#000 30%,transparent 82%);
    }
    .wrap{position:relative; z-index:2; height:100%; display:flex; align-items:center;}
    .left{ flex:0 0 56%; padding:0 0 0 96px; }
    .brand{display:flex; align-items:center; gap:26px; margin-bottom:42px;}
    .mark{width:84px;height:84px;filter:drop-shadow(0 0 22px rgba(92,219,122,0.5));}
    .wordmark{
        font-family:'Orbitron',sans-serif; font-weight:800; font-size:64px;
        letter-spacing:0.18em; color:var(--mantis); text-shadow:0 0 34px rgba(92,219,122,0.4);
    }
    h1{font-size:78px; font-weight:700; line-height:1.02; letter-spacing:-0.02em;}
    h1 .accent{color:var(--mantis);}
    .sub{
        margin-top:30px; font-family:'JetBrains Mono',monospace;
        font-size:26px; color:var(--muted); letter-spacing:0.01em; max-width:680px; line-height:1.45;
    }
    .pill-row{margin-top:44px; display:flex; gap:16px; flex-wrap:wrap;}
    .pill{
        border:1px solid rgba(92,219,122,0.35); background:rgba(92,219,122,0.07);
        color:var(--mantis-bright); padding:12px 22px; border-radius:999px;
        font-family:'JetBrains Mono',monospace; font-size:20px;
    }
    /* right: mini node-graph "canvas" */
    .right{ flex:1; height:100%; position:relative; }
    .canvas{
        position:absolute; inset:64px 80px 64px 0;
        border:1px solid rgba(92,219,122,0.16); border-radius:20px;
        background:rgba(4,10,6,0.55);
        box-shadow:inset 0 0 80px rgba(92,219,122,0.05);
        overflow:hidden;
    }
    .canvas .dots{
        position:absolute; inset:0;
        background-image:radial-gradient(rgba(92,219,122,0.22) 1.3px, transparent 1.3px);
        background-size:30px 30px; opacity:0.5;
    }
    .prompt{
        position:absolute; top:40px; left:40px; right:40px;
        font-family:'JetBrains Mono',monospace; font-size:19px; color:var(--ink);
        border:1px solid rgba(92,219,122,0.4); border-left:4px solid var(--mantis);
        background:rgba(92,219,122,0.06); padding:18px 22px; border-radius:10px; line-height:1.45;
    }
    .prompt .c{color:var(--mantis);}
    .node{
        position:absolute; padding:11px 16px; border-radius:9px;
        background:linear-gradient(180deg,#0c1a11,#081109);
        border:1px solid rgba(92,219,122,0.5);
        font-family:'JetBrains Mono',monospace; font-size:16px; color:var(--mantis-bright);
        box-shadow:0 8px 24px rgba(0,0,0,0.45), 0 0 18px rgba(92,219,122,0.12);
        white-space:nowrap;
    }
    svg.wires{position:absolute; inset:0; width:100%; height:100%; pointer-events:none;}
</style>
</head>
<body>
    <div class="grid"></div>
    <div class="wrap">
        <div class="left">
            <div class="brand">
                <svg class="mark" viewBox="0 0 36 36" fill="none">
                    <line x1="18" y1="5" x2="18" y2="18" stroke="#5CDB7A" stroke-width="1.2" opacity="0.45"/>
                    <line x1="5" y1="15" x2="18" y2="18" stroke="#5CDB7A" stroke-width="1.2" opacity="0.45"/>
                    <line x1="31" y1="15" x2="18" y2="18" stroke="#5CDB7A" stroke-width="1.2" opacity="0.45"/>
                    <line x1="10" y1="28" x2="18" y2="18" stroke="#5CDB7A" stroke-width="1.2" opacity="0.45"/>
                    <line x1="26" y1="28" x2="18" y2="18" stroke="#5CDB7A" stroke-width="1.2" opacity="0.45"/>
                    <circle cx="18" cy="5" r="3.5" fill="#5CDB7A"/>
                    <circle cx="5" cy="15" r="2.5" fill="#5CDB7A" opacity="0.7"/>
                    <circle cx="31" cy="15" r="2.5" fill="#5CDB7A" opacity="0.7"/>
                    <circle cx="10" cy="28" r="2.5" fill="#5CDB7A" opacity="0.7"/>
                    <circle cx="26" cy="28" r="2.5" fill="#5CDB7A" opacity="0.7"/>
                    <circle cx="18" cy="18" r="4" fill="#5CDB7A"/>
                </svg>
                <div class="wordmark">MANTIS</div>
            </div>
            <h1>Talk to Grasshopper.<br><span class="accent">Build anything.</span></h1>
            <div class="sub">Describe it in plain English — native, editable components build themselves on your canvas.</div>
            <div class="pill-row">
                <div class="pill">native components</div>
                <div class="pill">runs offline</div>
                <div class="pill">free &amp; open source</div>
            </div>
        </div>
        <div class="right">
            <div class="canvas">
                <div class="dots"></div>
                <div class="prompt"><span class="c">&gt;</span> a tower that <span class="c">tapers</span> as it rises</div>
                <svg class="wires" viewBox="0 0 640 560" preserveAspectRatio="none">
                    <path d="M120 250 C 200 250, 200 210, 280 210" stroke="#5CDB7A" stroke-width="2" fill="none" opacity="0.55"/>
                    <path d="M120 330 C 200 330, 200 300, 280 300" stroke="#5CDB7A" stroke-width="2" fill="none" opacity="0.55"/>
                    <path d="M430 210 C 500 210, 500 260, 470 290" stroke="#5CDB7A" stroke-width="2" fill="none" opacity="0.55"/>
                    <path d="M430 300 C 480 300, 480 300, 470 300" stroke="#5CDB7A" stroke-width="2" fill="none" opacity="0.55"/>
                </svg>
                <div class="node" style="top:228px; left:40px;">Slider · height</div>
                <div class="node" style="top:308px; left:40px;">Slider · radius</div>
                <div class="node" style="top:188px; left:280px;">Circle</div>
                <div class="node" style="top:278px; left:300px;">Move</div>
                <div class="node" style="top:268px; left:468px;">Loft &rarr;</div>
            </div>
        </div>
    </div>
</body>
</html>
