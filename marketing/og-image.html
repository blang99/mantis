<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!--
  Social share card source (1200×630). Render to og-image.png:
    open in a browser at 1200×630 and screenshot, or use a headless
    screenshot tool. Referenced by landing-page.html's og:image / twitter:image.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
        background:
            radial-gradient(900px 600px at 78% 20%, rgba(92,219,122,0.14), transparent 60%),
            radial-gradient(700px 500px at 10% 100%, rgba(92,219,122,0.07), transparent 60%),
            #060d08;
        font-family: 'Space Grotesk', sans-serif;
        color: #DCEBE1;
        position: relative;
    }
    /* faint grid */
    .grid {
        position: absolute; inset: 0;
        background-image:
            linear-gradient(rgba(92,219,122,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(92,219,122,0.05) 1px, transparent 1px);
        background-size: 64px 64px;
        mask-image: radial-gradient(900px 600px at 50% 40%, #000 30%, transparent 80%);
    }
    .wrap {
        position: relative; z-index: 2;
        height: 100%;
        display: flex; flex-direction: column;
        justify-content: center;
        padding: 0 84px;
    }
    .brand { display: flex; align-items: center; gap: 28px; margin-bottom: 30px; }
    .mark { width: 96px; height: 96px; filter: drop-shadow(0 0 22px rgba(92,219,122,0.45)); }
    .wordmark {
        font-family: 'Orbitron', sans-serif;
        font-weight: 800;
        font-size: 88px;
        letter-spacing: 0.16em;
        color: #5CDB7A;
        text-shadow: 0 0 36px rgba(92,219,122,0.4);
    }
    h1 {
        font-size: 52px; font-weight: 600; line-height: 1.1;
        max-width: 980px; letter-spacing: -0.01em;
    }
    h1 .accent { color: #5CDB7A; }
    .sub {
        margin-top: 26px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 23px; color: #8CAA96; letter-spacing: 0.02em;
    }
    .pill-row { margin-top: 40px; display: flex; gap: 14px; }
    .pill {
        border: 1px solid rgba(92,219,122,0.35);
        background: rgba(92,219,122,0.07);
        color: #9FE7B4;
        padding: 10px 20px; border-radius: 999px;
        font-family: 'JetBrains Mono', monospace; font-size: 18px;
    }
    .url {
        position: absolute; bottom: 44px; right: 84px; z-index: 2;
        font-family: 'JetBrains Mono', monospace; font-size: 20px;
        color: #5CDB7A; letter-spacing: 0.04em;
    }
</style>
</head>
<body>
    <div class="grid"></div>
    <div class="wrap">
        <div class="brand">
            <svg class="mark" viewBox="0 0 36 36" fill="none">
                <line x1="18" y1="5" x2="18" y2="18" stroke="#5CDB7A" stroke-width="1.2" opacity="0.45"/>
                <line x1="5" y1="15" x2="18" y2="18" stroke="#5CDB7A" stroke-width="1.2" opacity="0.45"/>
                <line x1="31" y1="15" x2="18" y2="18" stroke="#5CDB7A" stroke-width="1.2" opacity="0.45"/>
                <line x1="10" y1="28" x2="18" y2="18" stroke="#5CDB7A" stroke-width="1.2" opacity="0.45"/>
                <line x1="26" y1="28" x2="18" y2="18" stroke="#5CDB7A" stroke-width="1.2" opacity="0.45"/>
                <circle cx="18" cy="5" r="3.5" fill="#5CDB7A"/>
                <circle cx="5" cy="15" r="2.5" fill="#5CDB7A" opacity="0.7"/>
                <circle cx="31" cy="15" r="2.5" fill="#5CDB7A" opacity="0.7"/>
                <circle cx="10" cy="28" r="2.5" fill="#5CDB7A" opacity="0.7"/>
                <circle cx="26" cy="28" r="2.5" fill="#5CDB7A" opacity="0.7"/>
                <circle cx="18" cy="18" r="4" fill="#5CDB7A"/>
            </svg>
            <div class="wordmark">MANTIS</div>
        </div>
        <h1>Describe it in plain language.<br>Watch <span class="accent">native Grasshopper</span> components build — live.</h1>
        <div class="sub">AI-powered parametric scripting for Rhino 8</div>
        <div class="pill-row">
            <div class="pill">100% native components</div>
            <div class="pill">5 AI providers</div>
            <div class="pill">Free &amp; open source</div>
        </div>
    </div>
    <div class="url">mantis.design</div>
</body>
</html>
